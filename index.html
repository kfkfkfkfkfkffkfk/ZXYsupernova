<style>
:root {
  --bg: #ffffff;
  --accent: #007aff;
  --text: #1c1c1e;
  --danger: #ff3b30;
  --success: #34c759;
  --bubble-them: #e5e5ea;
  --sidebar-width: 340px;
  --toolbar-height: 80px;
}
body, html {
  margin: 0; padding: 0; height: 100%; width: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #000; color: var(--text); overflow: hidden;
}
/* ── MOBILE ── */
@media only screen and (max-width: 768px) {
  body { display: flex; flex-direction: row; }
  #main-stage { flex: 1; margin-bottom: 0; margin-right: 0; width: calc(100% - 44px); }
  .toolbar { display: none !important; }
  #vertical-toolbar { display: flex !important; }
  #chat-sidebar {
    position: fixed !important; left: 0 !important; right: 0 !important;
    bottom: 0 !important; top: auto !important; width: 100% !important;
    max-width: 100% !important; height: 60vh; border-left: none !important;
    border-top: 1px solid #d1d1d6; border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.18); z-index: 400 !important;
    transform: translateY(100%) !important;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1) !important;
  }
  #chat-sidebar.hidden { transform: translateY(100%) !important; }
  #chat-sidebar:not(.hidden) { transform: translateY(0) !important; }
  #chat-sidebar::before {
    content: ''; display: block; width: 36px; height: 4px;
    background: #ccc; border-radius: 2px; margin: 8px auto 2px; flex-shrink: 0;
  }
  #resizer { display: none; }
  #restore-chat { display: none !important; }
}
@media not all and (max-width: 768px) {
  body { display: flex; flex-direction: row; }
  #vertical-toolbar { display: none !important; }
}
#main-stage {
  flex-grow: 1; position: relative; background: #111;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 10px; padding: 10px; overflow: hidden;
  margin-bottom: var(--toolbar-height);
  transition: margin-right 0.35s cubic-bezier(0.4,0,0.2,1);
}
.toolbar {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 5px;
  background: rgba(255,255,255,0.88); backdrop-filter: blur(15px);
  padding: 5px 12px; border-radius: 22px; z-index: 3000; align-items: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  max-width: 92vw; overflow-x: auto;
  transition: left 0.35s cubic-bezier(0.4,0,0.2,1), transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
body.chat-open .toolbar { left: calc(50% - var(--sidebar-width) / 2); }
.toolbar button { padding: 5px 10px; font-size: 0.71rem; border-radius: 13px; height: 30px; display: flex; align-items: center; justify-content: center; }
.toolbar input { border: 1px solid #ccc; border-radius: 12px; padding: 4px 9px; width: 82px; outline: none; font-size: 0.71rem; }
#vertical-toolbar {
  display: none; flex-direction: column; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(15px);
  padding: 8px 0; width: 44px; position: fixed; right: 0; top: 0; bottom: 0;
  z-index: 3000; box-shadow: -2px 0 16px rgba(0,0,0,0.18); overflow-y: auto; box-sizing: border-box;
}
#vertical-toolbar .vt-input {
  writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
  border: 1px solid #ccc; border-radius: 8px; padding: 8px 3px; width: 22px;
  outline: none; font-size: 9px; background: white; text-align: center; margin: 2px 0;
  flex-shrink: 0; min-height: 60px;
}
#vertical-toolbar .vt-btn {
  width: 34px; height: 34px; border-radius: 10px; border: none; cursor: pointer;
  font-size: 8px; font-weight: 700; color: white; display: flex; align-items: center;
  justify-content: center; text-align: center; line-height: 1.2; padding: 2px;
  box-sizing: border-box; writing-mode: vertical-rl; text-orientation: mixed;
  transform: rotate(180deg); word-break: keep-all; flex-shrink: 0; letter-spacing: 0.02em;
}
#vertical-toolbar .vt-btn.round {
  writing-mode: horizontal-tb; transform: none; border-radius: 50%;
  width: 34px; height: 34px; font-size: 14px;
}
.vt-btn.btn-blue { background: var(--accent); }
.vt-btn.btn-red { background: var(--danger); }
.vt-btn.btn-green { background: var(--success); }
.vt-btn.btn-gray { background: #555; }
.vt-btn.btn-purple { background: #5856d6; }

/* ── CHAT SIDEBAR ── */
#chat-sidebar {

  border-left: 1px solid #d1d1d6; position: relative; z-index: 101;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), width 0s; flex-shrink: 0;
}
#chat-sidebar.smooth-width { transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), width 0.35s cubic-bezier(0.4,0,0.2,1); }
#chat-sidebar.hidden { transform: translateX(100%); position: absolute; right: 0; height: 100%; }
#resizer { width: 8px; cursor: col-resize; position: absolute; left: -4px; top: 0; bottom: 0; z-index: 102; }
#restore-chat {
  position: fixed; right: 80px; top: 20px; z-index: 3001; background: var(--accent);
  padding: 10px 20px; border-radius: 20px; display: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; color: white; cursor: pointer; font-weight: bold;
}

/* ── LOCAL VIDEO BOX ── */
#local-container {
  position: absolute; top: 0; left: 0; width: 220px; aspect-ratio: 16/9;
  border-radius: 12px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  z-index: 2000; cursor: grab; background: #000; border: 3px solid #007aff;
  touch-action: none; will-change: transform; transform: translate3d(20px, 20px, 0);
}
#local-container:active { cursor: grabbing; }
#local-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); pointer-events: none; display: block; }

/* Fullscreen button overlay */
#local-fullscreen-btn {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: transparent; cursor: pointer; z-index: 2002;
  font-size: 28px; color: transparent;
  transition: background 0.18s, color 0.18s;
  border: none; padding: 0; margin: 0; width: 100%; height: 100%;
  -webkit-tap-highlight-color: transparent;
}
#local-container:hover #local-fullscreen-btn,
#local-fullscreen-btn:focus {
  background: rgba(0,0,0,0.38); color: white;
}

#fullscreen-overlay.active { display: flex; }

#fullscreen-exit-btn {

}

/* ── MESSAGES ── */
#messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fff; }
.id-system-msg {
  align-self: center; font-size: 13px; font-weight: 600; color: white; margin: 8px 0;

}
.sys-msg {

.msg-wrapper {

.msg-wrapper.me { align-self: flex-end; align-items: flex-end; }

.msg-actions {

.bubble-container {

}

.msg-bubble {

.me .msg-bubble { border-bottom-right-radius: 4px; }

/* ── INLINE LINKS in bubbles ── */
.msg-bubble a.inline-link {
  color: rgba(255,255,255,0.95);

.emoji-trigger { font-size: 20px; cursor: pointer; padding: 3px; display: inline-flex; align-items: center; user-select: none; flex-shrink: 0; line-height: 1; }

.action-btn {

}

.util-btns {

}
.util-btn-small {

  padding: 3px 4px; color: #555; transition: transform 0.15s ease, color 0.15s;

}
.util-btn-small:hover { transform: scale(1.3); color: #007aff; }
.util-btn-small.del:hover { color: #ff3b30; }

.msg-meta { font-size: 10px; color: #8e8e93; margin-top: 4px; display: flex; gap: 5px; align-items: center; }
.reaction-badge { font-size: 22px; line-height: 1; cursor: default; }
.edited-tag { font-size: 9px; color: #aaa; font-style: italic; }

/* BIG FLOATING REACTION */
.big-reaction-popup {
  position: fixed; font-size: 72px; z-index: 9999; pointer-events: none;
  animation: bigReactPop 1.8s ease forwards; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.35));
}
@keyframes bigReactPop {
  0%   { transform: scale(0.3) translateY(0);    opacity: 1; }
  40%  { transform: scale(1.3) translateY(-30px); opacity: 1; }
  70%  { transform: scale(1.0) translateY(-60px); opacity: 1; }
  100% { transform: scale(0.8) translateY(-120px);opacity: 0; }
}

/* BUTTONS */
button { border: none; color: white; padding: 8px 16px; border-radius: 18px; font-weight: 600; cursor: pointer; font-size: 0.8rem; }
.btn-blue   { background: var(--accent); }

<script>
/* ════════════════════════════════════════════
   PEER COLOR SYSTEM
   - 8 distinct colors, none reused within a call
   - "Me" is always #007aff (blue)
   - Remote peers get assigned from PEER_COLORS in arrival order
   - Colors sync via broadcastColorMap so all clients agree
   ════════════════════════════════════════════ */
const MY_COLOR = '#007aff';

// 8 colors that are visually distinct from MY_COLOR and from each other
const PEER_COLORS = [
  '#ff3b30', // red
  '#34c759', // green
  '#ff9500', // orange
  '#af52de', // purple
  '#ff2d55', // pink
  '#5ac8fa', // sky
  '#ffcc00', // yellow
  '#00c7be', // teal
];

const peerColorMap  = {}; // peerId → hex
const knownPeerIds  = []; // ordered list of discovered peer IDs

function registerPeer(peerId) {
  if (peerId === myId) return MY_COLOR;
  if (peerColorMap[peerId]) return peerColorMap[peerId];
  // Count how many non-me peers we already have to get next color index
  const existingPeers = knownPeerIds.filter(id => id !== myId);
  const idx = existingPeers.length % PEER_COLORS.length;
  knownPeerIds.push(peerId);
  peerColorMap[peerId] = PEER_COLORS[idx];
  broadcastColorMap();
  return peerColorMap[peerId];
}

function broadcastColorMap() {
  const payload = { type: 'colormap', map: peerColorMap, ids: knownPeerIds };
  Object.values(connections).forEach(c => { try { c.send(payload); } catch(e){} });
}

function applyColorMap(map, ids) {
  // Merge incoming data — only add new entries, never overwrite existing assignments
  ids.forEach(id => {
    if (!knownPeerIds.includes(id)) knownPeerIds.push(id);
  });
  Object.keys(map).forEach(id => {
    if (!peerColorMap[id]) peerColorMap[id] = map[id];
  });
  // Refresh video borders
  Object.keys(peerVideoSlots).forEach(pid => {
    const slot = peerVideoSlots[pid];
    if (slot && peerColorMap[pid]) slot.style.borderColor = peerColorMap[pid];
  });
}

function getPeerColor(peerId) {
  if (peerId === myId) return MY_COLOR;
  return peerColorMap[peerId] || registerPeer(peerId);
}

/* ════════════════════════════════════════════
   PEER SETUP
   ════════════════════════════════════════════ */
const peer = new Peer();
let myStream, myScreen, myId = null, modalAction = null;
let pendingJoinId = null;
let streamReady = false, peerReady = false;
const connections = {}, calls = {};
const peerVideoSlots = {};
const sidebar   = document.getElementById('chat-sidebar');
const resizer   = document.getElementById('resizer');
const restoreBtn = document.getElementById('restore-chat');
const localBox  = document.getElementById('local-container');
let miniplayerWin = null, miniplayerInterval = null;
let isPageVisible = true;

/* ── TOAST ── */
function showToast(msg, duration=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* ── NOTIFICATION PERMISSION ── */
function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

/* ── iOS: hide screen share ── */
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
if (isIOS) {
  ['btn-screen','vbtn-screen'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}

/* ════════════════════════════════════════════
   FULLSCREEN — local video
   Works with mouse click AND touch tap.
   The button covers the entire local-container.
   ════════════════════════════════════════════ */
let isLocalFullscreen = false;

const fullscreenBtn = document.getElementById('local-fullscreen-btn');
const fullscreenOverlay = document.getElementById('fullscreen-overlay');
const fullscreenVideo   = document.getElementById('fullscreen-video');
const fullscreenExitBtn = document.getElementById('fullscreen-exit-btn');

// Tap/click on the local video box opens fullscreen
fullscreenBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  toggleLocalFullscreen();
});
// Also allow tapping anywhere on the local-container (not just the icon)
localBox.addEventListener('click', function(e) {
  // Only fire if we weren't dragging
  if (!wasDragging) toggleLocalFullscreen();
});

// Exit button — both click and touchend
fullscreenExitBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  exitFullscreen();
});
fullscreenExitBtn.addEventListener('touchend', function(e) {
  e.preventDefault();
  e.stopPropagation();
  exitFullscreen();
});

// Tapping the fullscreen overlay background also exits
fullscreenOverlay.addEventListener('click', function(e) {
  if (e.target === fullscreenOverlay || e.target === fullscreenVideo) exitFullscreen();
});

function toggleLocalFullscreen() {
  if (isLocalFullscreen) exitFullscreen();
  else enterFullscreen();
}
function enterFullscreen() {
  const lv = document.getElementById('local-video');
  fullscreenVideo.srcObject = lv.srcObject;
  fullscreenOverlay.classList.add('active');
  isLocalFullscreen = true;
}
function exitFullscreen() {
  fullscreenOverlay.classList.remove('active');
  setTimeout(() => { fullscreenVideo.srcObject = null; }, 300);
  isLocalFullscreen = false;
}
// Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isLocalFullscreen) exitFullscreen();
});

/* ════════════════════════════════════════════
   DRAG (local video)
   Track whether it was a drag vs a tap
   ════════════════════════════════════════════ */
let currentX = 20, currentY = 20, initialX, initialY;
let xOffset = 20, yOffset = 20, activeDragging = false;
let lastTime = 0, lastX = 0, lastY = 0, velocityX = 0, velocityY = 0, inertiaFrameId = null;
let wasDragging = false;
let dragStartX = 0, dragStartY = 0;

localBox.addEventListener('pointerdown', dragStart, { passive: false });
document.addEventListener('pointermove', dragMove, { passive: false });
document.addEventListener('pointerup', dragEnd);

function dragStart(e) {
  if (inertiaFrameId) cancelAnimationFrame(inertiaFrameId);
  initialX = e.clientX - xOffset;
  initialY = e.clientY - yOffset;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  wasDragging = false;
  if (localBox.contains(e.target)) {
    activeDragging = true;
    localBox.setPointerCapture(e.pointerId);
    lastTime = performance.now(); lastX = e.clientX; lastY = e.clientY;
    velocityX = 0; velocityY = 0;
  }
}
function dragMove(e) {
  if (!activeDragging) return;
  e.preventDefault();
  const now = performance.now(), dt = now - lastTime;
  if (dt > 0) {
    velocityX = (e.clientX - lastX) / dt;
    velocityY = (e.clientY - lastY) / dt;
    lastTime = now; lastX = e.clientX; lastY = e.clientY;
  }
  // If moved more than 5px, it's a drag
  if (Math.abs(e.clientX - dragStartX) > 5 || Math.abs(e.clientY - dragStartY) > 5) {
    wasDragging = true;
  }
  currentX = e.clientX - initialX;
  currentY = e.clientY - initialY;
  clampAndApply();
}
function dragEnd() {
  if (!activeDragging) return;
  activeDragging = false;
  initialX = currentX; initialY = currentY;
  const friction = 0.985;
  function glide() {
    if (Math.abs(velocityX) < 0.005 && Math.abs(velocityY) < 0.005) { cancelAnimationFrame(inertiaFrameId); return; }
    velocityX *= friction; velocityY *= friction;
    currentX += velocityX * 16; currentY += velocityY * 16;
    const h = clampAndApply();
    if (h.x) velocityX = 0; if (h.y) velocityY = 0;
    xOffset = currentX; yOffset = currentY; initialX = currentX; initialY = currentY;
    inertiaFrameId = requestAnimationFrame(glide);
  }
  inertiaFrameId = requestAnimationFrame(glide);
  // Reset wasDragging after a tick so the click handler can read it
  setTimeout(() => { wasDragging = false; }, 50);
}
function clampAndApply() {
  const bw = localBox.offsetWidth, bh = localBox.offsetHeight;
  const ww = window.innerWidth, wh = window.innerHeight;
  const vtw = document.getElementById('vertical-toolbar').offsetWidth || 0;
  const isChatOpen = !sidebar.classList.contains('hidden');
  const maxX = (isChatOpen ? ww - sidebar.offsetWidth : ww) - vtw - bw;
  let hx = false, hy = false;
  if (currentX < 0) { currentX = 0; hx = true; }
  if (currentY < 0) { currentY = 0; hy = true; }
  if (currentX > maxX) { currentX = Math.max(0, maxX); hx = true; }
  if (currentY + bh > wh) { currentY = wh - bh; hy = true; }
  xOffset = currentX; yOffset = currentY;
  localBox.style.transform = `translate3d(${currentX}px,${currentY}px,0)`;
  return { x: hx, y: hy };
}

/* ── RESIZER ── */
let isResizing = false, baseSidebarWidth = 340;
resizer.addEventListener('pointerdown', (e) => {
  isResizing = true; sidebar.classList.remove('smooth-width');
  document.body.style.cursor = 'col-resize'; resizer.setPointerCapture(e.pointerId);
});
document.addEventListener('pointermove', (e) => {
  if (!isResizing) return;
  let nw = window.innerWidth - e.clientX;
  if (nw < 150) { toggleChat(false); isResizing = false; return; }
  if (nw > window.innerWidth * 0.8) nw = window.innerWidth * 0.8;
  baseSidebarWidth = nw; sidebar.style.width = nw + 'px';
  document.documentElement.style.setProperty('--sidebar-width', nw + 'px');
  adjustLocalBoxBoundary();
});
document.addEventListener('pointerup', () => { isResizing = false; document.body.style.cursor = 'default'; });

function toggleChat(show) {
  sidebar.classList.add('smooth-width');
  if (show) {
    sidebar.classList.remove('hidden'); restoreBtn.style.display = 'none';
    document.body.classList.add('chat-open'); clearChatNotifDot();
  } else {
    sidebar.classList.add('hidden'); restoreBtn.style.display = 'block';
    document.body.classList.remove('chat-open');
  }
  setTimeout(() => { adjustLocalBoxBoundary(); sidebar.classList.remove('smooth-width'); }, 380);
}
function adjustLocalBoxBoundary() {
  const bw = localBox.offsetWidth, ww = window.innerWidth;
  const vtw = document.getElementById('vertical-toolbar').offsetWidth || 0;
  const isChatOpen = !sidebar.classList.contains('hidden');
  const maxX = (isChatOpen ? ww - sidebar.offsetWidth : ww) - vtw - bw;
  if (currentX > maxX) { currentX = Math.max(0, maxX); xOffset = currentX; localBox.style.transform = `translate3d(${currentX}px,${currentY}px,0)`; }
}

/* ── HOVER TIMEOUT ── */
const hoverTimers = new Map();
function setupHoverTimeout(wrapper) {
  wrapper.addEventListener('mouseenter', () => {
    clearTimeout(hoverTimers.get(wrapper));
    wrapper.classList.add('actions-visible');
  });
  wrapper.addEventListener('mouseleave', () => {
    const t = setTimeout(() => wrapper.classList.remove('actions-visible'), 2000);
    hoverTimers.set(wrapper, t);
  });
  const actions = wrapper.querySelector('.msg-actions');
  if (actions) {
    actions.addEventListener('mouseenter', () => { clearTimeout(hoverTimers.get(wrapper)); wrapper.classList.add('actions-visible'); });
    actions.addEventListener('mouseleave', () => { const t = setTimeout(() => wrapper.classList.remove('actions-visible'), 2000); hoverTimers.set(wrapper, t); });
  }
}

/* ── VISIBILITY: auto miniplayer ── */
document.addEventListener('visibilitychange', () => {
  isPageVisible = !document.hidden;
  if (document.hidden && Object.keys(peerVideoSlots).length > 0) openMiniplayer(true);
  else if (!document.hidden && miniplayerWin && !miniplayerWin.closed) {
    miniplayerWin.close(); miniplayerWin = null; clearInterval(miniplayerInterval);
    document.getElementById('pip-badge').style.display = 'none';
    showToast('📺 Miniplayer closed, welcome back!');
  }
});

/* ── URL HASH ── */
function checkHashAndMaybeJoin() {
  const hash = window.location.hash.replace('#', '').trim();
  if (!hash || hash === myId) return;
  pendingJoinId = hash; tryAutoJoin();
}
function tryAutoJoin() {
  if (!pendingJoinId || !streamReady || !peerReady) return;
  if (connections[pendingJoinId] || calls[pendingJoinId]) { pendingJoinId = null; return; }
  connectToPeer(pendingJoinId); pendingJoinId = null;
  history.replaceState(null, '', window.location.pathname + window.location.search);
}
function joinFromBanner() {
  const banner = document.getElementById('join-banner');
  const id = banner.dataset.targetId;
  banner.style.display = 'none';
  if (id) connectToPeer(id);
}

/* ── MEDIA ── */
navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
  myStream = stream;
  document.getElementById('local-video').srcObject = stream;
  streamReady = true; tryAutoJoin();
}).catch(() => { streamReady = true; tryAutoJoin(); showToast('⚠️ Camera/mic access denied.'); });

peer.on('open', id => {
  myId = id; peerReady = true;
  requestNotifPermission();
  const msg = document.createElement('div');
  msg.className = 'id-system-msg';
  msg.innerText = `Your ID: ${id}`;
  msg.title = 'Click to copy your ID';
  msg.addEventListener('click', copyMyId);
  document.getElementById('messages').appendChild(msg);
  const hash = window.location.hash.replace('#', '').trim();
  if (hash && hash !== id) {
    const banner = document.getElementById('join-banner');
    banner.dataset.targetId = hash;
    document.getElementById('join-banner-text').textContent = `Join call? (Host ID: ${hash.substring(0,8)}…)`;
    banner.style.display = 'block';
  }
  tryAutoJoin();
});
peer.on('call', call => { call.answer(myStream); handleCall(call); });
peer.on('connection', conn => setupChat(conn));
peer.on('error', err => {
  if (err.type === 'peer-unavailable') showToast('❌ Peer not found. Check the ID.');
  else showToast('⚠️ Connection error: ' + err.type);
});

/* ── COPY MY ID ── */
function copyMyId() {
  if (!myId) return;
  navigator.clipboard.writeText(myId).then(() => showToast('⛬ Your ID copied!')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = myId;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    showToast('⛬ Your ID copied!');
  });
}

/* ── CONNECT ── */
function connectToPeer(id) {
  if (!id) return;
  if (calls[id]) { showToast('Already connected to this peer.'); return; }
  addSysMsg(`Connecting to ${id.substring(0,8)}…`);
  registerPeer(id);
  handleCall(peer.call(id, myStream));
  setupChat(peer.connect(id));
}
function joinCall() {
  const id = document.getElementById('friend-id-input').value.trim();
  if (!id) { showToast('Paste a peer ID first.'); return; }
  document.getElementById('friend-id-input').value = '';
  connectToPeer(id);
}
function joinCallV() {
  const id = document.getElementById('friend-id-input-v').value.trim();
  if (!id) { showToast('Paste a peer ID first.'); return; }
  document.getElementById('friend-id-input-v').value = '';
  connectToPeer(id);
}

/* ── CALL HANDLING ── */
function getOrCreateVideoSlot(peerId) {
  const color = getPeerColor(peerId);
  if (peerVideoSlots[peerId]) return peerVideoSlots[peerId];
  document.getElementById('empty-state').style.display = 'none';
  const wrapper = document.createElement('div');
  wrapper.className = 'remote-video-wrapper';
  wrapper.id = `vw-${peerId}`;
  wrapper.style.border = `3px solid ${color}`;
  wrapper.style.borderRadius = '14px';
  wrapper.style.minHeight = '160px';
  wrapper.innerHTML = `<div class="peer-connecting"><div class="connecting-spinner"></div>Connecting…</div>`;
  const v = document.createElement('video');
  v.id = `v-${peerId}`; v.className = 'remote-video'; v.autoplay = true; v.playsInline = true;
  const label = document.createElement('div');
  label.className = 'peer-label'; label.textContent = peerId.substring(0, 12) + '…';
  wrapper.appendChild(v); wrapper.appendChild(label);
  document.getElementById('main-stage').appendChild(wrapper);
  peerVideoSlots[peerId] = wrapper;
  return wrapper;
}
function handleCall(call) {
  calls[call.peer] = call;
  registerPeer(call.peer);
  getOrCreateVideoSlot(call.peer);
  call.on('stream', stream => {
    const slot = getOrCreateVideoSlot(call.peer);
    const spinner = slot.querySelector('.peer-connecting');
    if (spinner) spinner.remove();
    slot.querySelector('video').srcObject = stream;
    addSysMsg(`🟢 ${call.peer.substring(0,8)}… joined`);
    showToast('🟢 Peer connected!');
    if (miniplayerWin && !miniplayerWin.closed) setTimeout(syncMiniplayerStreams, 300);
  });
  call.on('close', () => {
    const slot = peerVideoSlots[call.peer];
    if (slot) { const v = slot.querySelector('video'); if (v) v.srcObject = null; }
    addSysMsg(`🔴 ${call.peer.substring(0,8)}… left`);
    delete calls[call.peer]; updateEmptyState();
  });
  call.on('error', () => { delete calls[call.peer]; updateEmptyState(); });
}

/* ── CHAT SETUP ── */
function setupChat(conn) {
  connections[conn.peer] = conn;
  registerPeer(conn.peer);
  conn.on('data', data => {
    if (data.type === 'colormap') { applyColorMap(data.map, data.ids); return; }
    if (data.type === 'chat') {
      appendMessage({ text: data.text, files: data.files || [], links: data.links || [] }, 'them', conn.peer, data.msgId);
      sendBrowserNotif(`💬 ${conn.peer.substring(0,8)}…`, data.text || '(attachment)');
      showChatNotifDot();
    }
    if (data.type === 'react') {
      const r = document.getElementById('re-' + data.id);
      if (r) { r.innerText = data.emoji; showBigReaction(data.emoji); }
      sendBrowserNotif(`${data.emoji} Reaction`, `${conn.peer.substring(0,8)}… reacted`);
      showChatNotifDot();
    }
    if (data.type === 'edit') {
      const bubble = document.getElementById(data.id);
      if (bubble) {
        bubble.innerHTML = data.newHtml || escHtml(data.newText || '');
        const editTag = document.getElementById('edited-' + data.id);
        if (editTag) editTag.style.display = 'inline';
      }
    }
    if (data.type === 'delete') {
      const wrapper = document.getElementById('wrap-' + data.id);
      if (wrapper) wrapper.remove();
    }
  });
  conn.on('close', () => { delete connections[conn.peer]; });
  setTimeout(() => broadcastColorMap(), 500);
}
function updateEmptyState() {
  const hasVideos = Object.values(peerVideoSlots).some(s => s && s.isConnected);
  document.getElementById('empty-state').style.display = hasVideos ? 'none' : 'flex';
}
function addSysMsg(text) {
  const el = document.createElement('div');
  el.className = 'sys-msg'; el.textContent = text;
  document.getElementById('messages').appendChild(el);
  document.getElementById('messages').scrollTop = 99999;
}

/* ════════════════════════════════════════════
   INLINE LINK SYSTEM (Google Docs style)
   - Highlight text in the input, click 🔗
   - A modal asks for the URL
   - The highlighted text becomes the link text
   - In the bubble it renders as a styled <a> tag
   - Links are real href= links, not attachments
   ════════════════════════════════════════════ */

// Pending inline links: array of { label, url, placeholder }
let pendingInlineLinks = []; // { placeholder, label, url }
let linkModalCallback = null;

function handleLinkBtn() {
  const input = document.getElementById('chat-msg');
  const start = input.selectionStart;
  const end   = input.selectionEnd;
  const selected = input.value.substring(start, end).trim();

  if (!selected) {
    showToast('Highlight some text first, then click 🔗');
    return;
  }

  // Open the link URL modal
  openLinkModal(selected, function(url) {
    if (!url) return;
    // Replace the selected text with a placeholder token so we can track it
    const placeholder = `\x02LINK_${Date.now()}\x03`;
    const before = input.value.substring(0, start);
    const after  = input.value.substring(end);
    input.value = before + placeholder + after;
    // Store mapping
    pendingInlineLinks.push({ placeholder, label: selected, url });
  });
}

function openLinkModal(selectedText, callback) {
  const overlay = document.getElementById('link-modal-overlay');
  const urlInput = document.getElementById('link-modal-url');
  document.getElementById('link-modal-title').textContent =
    selectedText ? `Link "${selectedText.length > 30 ? selectedText.substring(0,30)+'…' : selectedText}"` : 'Insert link';
  urlInput.value = '';
  overlay.style.display = 'flex';
  setTimeout(() => urlInput.focus(), 80);
  linkModalCallback = callback;

  // Enter key confirms
  function onKey(e) {
    if (e.key === 'Enter') { e.preventDefault(); confirmLink(); }
    if (e.key === 'Escape') { closeLinkModal(); }
  }
  urlInput.addEventListener('keydown', onKey);
  urlInput._keyHandler = onKey;
}

function closeLinkModal() {
  document.getElementById('link-modal-overlay').style.display = 'none';
  const urlInput = document.getElementById('link-modal-url');
  if (urlInput._keyHandler) { urlInput.removeEventListener('keydown', urlInput._keyHandler); delete urlInput._keyHandler; }
  linkModalCallback = null;
}

function confirmLink() {
  let url = document.getElementById('link-modal-url').value.trim();
  if (!url) { showToast('Enter a URL'); return; }
  // Auto-prepend https:// if missing
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  closeLinkModal();
  if (linkModalCallback) linkModalCallback(url);
}

/* ── FILE ATTACHMENTS ── */
let pendingAttachments = [];

function triggerFileAttach() { document.getElementById('file-input').click(); }

function handleFileAttach(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      pendingAttachments.push({ type: 'file', name: file.name, size: file.size, fileType: file.type, dataUrl: e.target.result });
      renderAttachPreview();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderAttachPreview() {
  const area = document.getElementById('attach-preview');
  if (!pendingAttachments.length) { area.style.display = 'none'; area.innerHTML = ''; return; }
  area.style.display = 'flex'; area.innerHTML = '';
  pendingAttachments.forEach((att, i) => {
    const chip = document.createElement('div');
    chip.className = 'attach-chip';
    chip.innerHTML = `<span>${getFileIcon(att.fileType || '')} ${att.name}</span><button onclick="removeAttachment(${i})" title="Remove">✕</button>`;
    area.appendChild(chip);
  });
}
function removeAttachment(i) { pendingAttachments.splice(i, 1); renderAttachPreview(); }

function getFileIcon(mimeType) {
  if (!mimeType) return '📄';
  if (mimeType.startsWith('image/')) return '🖼️';
  if (mimeType.startsWith('video/')) return '🎬';
  if (mimeType.startsWith('audio/')) return '🎵';
  if (mimeType.includes('pdf')) return '📕';
  if (mimeType.includes('zip') || mimeType.includes('rar') || mimeType.includes('7z')) return '🗜️';
  if (mimeType.includes('word') || mimeType.includes('document')) return '📝';
  if (mimeType.includes('sheet') || mimeType.includes('excel') || mimeType.includes('csv')) return '📊';
  return '📄';
}
function formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

/* ── SEND CHAT MESSAGE ── */
function sendChatMessage() {
  let rawText = document.getElementById('chat-msg').value;
  const atts = [...pendingAttachments];

  // Resolve pending inline links — replace placeholder tokens with link objects
  const inlineLinks = [...pendingInlineLinks];
  pendingInlineLinks = [];

  // Build the final text with placeholders resolved to display text
  let displayText = rawText;
  inlineLinks.forEach(({ placeholder, label }) => {
    displayText = displayText.replace(placeholder, label);
  });
  displayText = displayText.trim();

  if (!displayText && !atts.length) return;

  const msgId = 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2,5);
  const payload = { type: 'chat', text: displayText, files: atts, msgId, inlineLinks };
  Object.values(connections).forEach(c => { try { c.send(payload); } catch(e){} });
  appendMessage({ text: displayText, files: atts, inlineLinks }, 'me', null, msgId);
  document.getElementById('chat-msg').value = '';
  pendingAttachments = [];
  renderAttachPreview();
}

/* ════════════════════════════════════════════
   BUILD BUBBLE CONTENT
   - Plain text rendered safely
   - Inline links rendered as <a class="inline-link">
   - File attachments embedded normally
   ════════════════════════════════════════════ */
function buildBubbleContent(text, files, inlineLinks) {
  let html = '';

  if (text) {
    // Build a map of label→url for inline links
    const linkMap = {};
    if (inlineLinks && inlineLinks.length) {
      inlineLinks.forEach(({ label, url }) => {
        linkMap[label] = url;
      });
    }

    if (inlineLinks && inlineLinks.length) {
      // Replace each link label with a real anchor tag
      // We need to do this carefully to avoid double-replacing
      let remaining = text;
      let segments = [];

      // Sort by position in text so we process left-to-right
      const positions = [];
      inlineLinks.forEach(({ label, url }) => {
        let searchFrom = 0;
        let idx;
        while ((idx = remaining.indexOf(label, searchFrom)) !== -1) {
          positions.push({ idx, len: label.length, label, url });
          searchFrom = idx + label.length;
          break; // only replace first occurrence per label
        }
      });
      positions.sort((a, b) => a.idx - b.idx);

      let cursor = 0;
      positions.forEach(({ idx, len, label, url }) => {
        if (idx >= cursor) {
          const plainPart = remaining.substring(cursor, idx);
          if (plainPart) segments.push(escHtml(plainPart));
          segments.push(`<a class="inline-link" href="${escHtml(url)}" target="_blank" rel="noopener noreferrer">${escHtml(label)}</a>`);
          cursor = idx + len;
        }
      });
      const tail = remaining.substring(cursor);
      if (tail) segments.push(escHtml(tail));
      html += `<div>${segments.join('')}</div>`;
    } else {
      html += `<div>${escHtml(text)}</div>`;
    }
  }

  if (files && files.length) {
    files.forEach(att => {
      if (att.fileType && att.fileType.startsWith('image/')) {
        html += `<img src="${att.dataUrl}" class="chat-img" alt="${escHtml(att.name)}" onclick="openLightbox(this.src)">`;
      } else if (att.fileType && att.fileType.startsWith('video/')) {
        html += `<video src="${att.dataUrl}" class="chat-video-attach" controls></video>`;
      } else if (att.fileType && att.fileType.startsWith('audio/')) {
        html += `<audio src="${att.dataUrl}" class="chat-audio-attach" controls></audio>`;
      } else {
        html += `<a href="${att.dataUrl || '#'}" download="${escHtml(att.name)}" class="file-attachment"><span class="file-icon">${getFileIcon(att.fileType || '')}</span><span class="file-info"><span class="file-name">${escHtml(att.name)}</span><span class="file-size">${formatFileSize(att.size)}</span></span></a>`;
      }
    });
  }
  return html;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.style.display = 'flex';
}

/* ── APPEND MESSAGE ── */
function appendMessage({ text, files, inlineLinks }, side, peerId, msgId) {
  if (!msgId) msgId = 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2,5);
  const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${side}`;
  wrapper.id = `wrap-${msgId}`;
  const bubbleColor = (side === 'me') ? MY_COLOR : (peerId ? getPeerColor(peerId) : '#8e8e93');
  const emojiList = ['😭','⏰','📚','🌐','📆','🤔','😈','😂','👏','🖐','🎉','💧','🔮','😀','😆','👋','🧻','🔥','✨','🚀','💯'];
  const emojiButtons = emojiList.map(e => `<button class="action-btn" data-emoji="${e}">${e}</button>`).join('');
  const innerContent = buildBubbleContent(text, files, inlineLinks);
  const canEdit = side === 'me' && !!(text);

  wrapper.innerHTML = `
    <div class="msg-actions" data-msgid="${msgId}">
      <span class="emoji-trigger" title="React">😊</span>
      <div class="emoji-tray">${emojiButtons}</div>
      <div class="util-btns">
        <button class="util-btn-small" title="Copy" data-action="copy" style="font-size:18px;">⛬</button>
        ${canEdit ? `<button class="util-btn-small" title="Edit" data-action="edit" style="font-size:17px;">☍</button>` : ''}
        ${side === 'me' ? `<button class="util-btn-small del" title="Delete" data-action="delete" style="font-size:17px;">⛿</button>` : ''}
      </div>
    </div>
    <div class="bubble-container">
      <div class="msg-bubble" id="${msgId}" style="background:${bubbleColor};">${innerContent}</div>
    </div>
    <div class="msg-meta"><span>${time}</span><span id="edited-${msgId}" class="edited-tag" style="display:none;">edited</span> <span id="re-${msgId}" class="reaction-badge"></span></div>
  `;

  const msgActionsEl = wrapper.querySelector('.msg-actions');
  const tray = wrapper.querySelector('.emoji-tray');
  const trigger = wrapper.querySelector('.emoji-trigger');

  msgActionsEl.addEventListener('mouseenter', () => { clearTimeout(collapseTimer); openEmojiTray(tray); });
  msgActionsEl.addEventListener('mouseleave', () => scheduleClose(tray));
  tray.addEventListener('mouseenter', () => clearTimeout(collapseTimer));
  tray.addEventListener('mouseleave', () => scheduleClose(tray));
  trigger.addEventListener('click', () => openEmojiTray(tray));

  tray.querySelectorAll('.action-btn').forEach(btn => {
    btn.addEventListener('click', () => { reactTo(msgId, btn.dataset.emoji); closeEmojiTray(tray); });
  });

  msgActionsEl.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      if (action === 'copy') {
        const bubble = document.getElementById(msgId);
        navigator.clipboard.writeText(bubble.innerText || bubble.textContent || '');
        showToast('⛬ Copied!');
      } else if (action === 'edit') {
        startEditMessage(msgId);
      } else if (action === 'delete') {
        deleteMessage(msgId);
      }
    });
  });

  document.getElementById('messages').appendChild(wrapper);
  document.getElementById('messages').scrollTop = 99999;
  setupHoverTimeout(wrapper);
  return msgId;
}

/* ── EDIT / DELETE ── */
function startEditMessage(msgId) {
  const bubble = document.getElementById(msgId);
  if (!bubble) return;
  const origHTML = bubble.innerHTML;
  const origText = bubble.textContent;
  bubble.setAttribute('contenteditable', 'true');
  bubble.focus();
  const range = document.createRange(); range.selectNodeContents(bubble);
  const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  function finishEdit(e) {
    if (e.type === 'keydown' && e.key !== 'Enter') return;
    if (e.type === 'keydown' && e.shiftKey) return;
    e.preventDefault();
    bubble.removeAttribute('contenteditable');
    bubble.removeEventListener('keydown', finishEdit);
    bubble.removeEventListener('blur', finishEdit);
    const newText = bubble.textContent.trim();
    if (!newText) { bubble.innerHTML = origHTML; return; }
    if (newText === origText) return;
    const editTag = document.getElementById('edited-' + msgId);
    if (editTag) editTag.style.display = 'inline';
    Object.values(connections).forEach(c => { try { c.send({ type: 'edit', id: msgId, newHtml: bubble.innerHTML, newText }); } catch(e){} });
  }
  bubble.addEventListener('keydown', finishEdit);
  bubble.addEventListener('blur', finishEdit);
}
function deleteMessage(msgId) {
  const wrapper = document.getElementById('wrap-' + msgId);
  if (wrapper) wrapper.remove();
  Object.values(connections).forEach(c => { try { c.send({ type: 'delete', id: msgId }); } catch(e){} });
}

/* ── REACTIONS ── */
function reactTo(id, emoji) {
  const el = document.getElementById('re-' + id);
  if (el) {
    el.innerText = emoji; showBigReaction(emoji);
    Object.values(connections).forEach(c => { try { c.send({ type: 'react', id, emoji }); } catch(e){} });
  }
}

/* ── EMOJI TRAY ── */
let openTray = null, collapseTimer = null;
function openEmojiTray(tray) {
  if (openTray && openTray !== tray) closeEmojiTray(openTray);
  clearTimeout(collapseTimer); openTray = tray; tray.classList.add('open');
  const needed = 900;
  if (sidebar.offsetWidth < needed) {
    const cap = Math.min(needed, window.innerWidth * 0.92);
    sidebar.classList.add('smooth-width'); sidebar.style.width = cap + 'px';
    document.documentElement.style.setProperty('--sidebar-width', cap + 'px');
  }
}
function scheduleClose(tray) { clearTimeout(collapseTimer); collapseTimer = setTimeout(() => closeEmojiTray(tray), 300); }
function closeEmojiTray(tray) {
  if (!tray) return; tray.classList.remove('open');
  if (openTray === tray) openTray = null;
  sidebar.classList.add('smooth-width'); sidebar.style.width = baseSidebarWidth + 'px';
  document.documentElement.style.setProperty('--sidebar-width', baseSidebarWidth + 'px');
}

/* ── CONTROLS ── */
function toggleMute() {
  if (!myStream) return;
  const track = myStream.getAudioTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  const label = track.enabled ? 'Mute' : 'Unmute';
  document.getElementById('btn-mute').innerText = label;
  const vb = document.getElementById('vbtn-mute'); if (vb) vb.innerText = label;
}
function toggleVideo() {
  if (!myStream) return;
  const track = myStream.getVideoTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  document.getElementById('btn-video').innerText = track.enabled ? 'Stop Video' : 'Start Video';
  const vb = document.getElementById('vbtn-video');
  if (vb) vb.innerHTML = track.enabled ? 'Stop<br>Vid' : 'Start<br>Vid';
}
function toggleScreen() {
  const btn = document.getElementById('btn-screen'), vbtn = document.getElementById('vbtn-screen');
  if (myScreen) {
    myScreen.getTracks().forEach(t => t.stop()); myScreen = null;
    btn.innerText = 'Share Screen'; btn.className = 'btn-blue';
    if (vbtn) { vbtn.innerText = 'Scrn'; vbtn.className = 'vt-btn btn-blue'; }
    if (myStream) { replacePeerTrack(myStream.getVideoTracks()[0]); document.getElementById('local-video').srcObject = myStream; }
  } else {
    if (!navigator.mediaDevices.getDisplayMedia) { alert('Screen sharing not supported.'); return; }
    navigator.mediaDevices.getDisplayMedia({ video: true, audio: false }).then(stream => {
      myScreen = stream; btn.innerText = 'Stop Sharing'; btn.className = 'btn-red';
      if (vbtn) { vbtn.innerText = 'Stop'; vbtn.className = 'vt-btn btn-red'; }
      stream.getVideoTracks()[0].onended = () => { if (myScreen) toggleScreen(); };
      replacePeerTrack(stream.getVideoTracks()[0]);
      document.getElementById('local-video').srcObject = stream;
    }).catch(err => console.error('Screen share error:', err));
  }
}
function replacePeerTrack(track) {
  if (!track) return;
  Object.values(peer.connections).forEach(list => {
    list.forEach(conn => {
      if (conn.peerConnection) {
        const sender = conn.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
        if (sender) sender.replaceTrack(track);
      }
    });
  });
}

window.zxyReturnToCall = function() {
  window.focus();
  if (miniplayerWin && !miniplayerWin.closed) {
    miniplayerWin.close(); miniplayerWin = null; clearInterval(miniplayerInterval);
    document.getElementById('pip-badge').style.display = 'none';
  }
};

function openMiniplayer(auto) {
  if (miniplayerWin && !miniplayerWin.closed) { if (!auto) miniplayerWin.focus(); return; }
  const w = 360, h = 260;
  const left = Math.max(0, window.screen.width - w - 16);
  const top  = Math.max(0, window.screen.height - h - 60);

  if (!miniplayerWin || miniplayerWin.closed) { showToast('⚠️ Popups blocked. Allow popups for this site.', 4000); miniplayerWin = null; return; }

  try {
    const bc = new BroadcastChannel(OPENER_CHANNEL_NAME);
    bc.onmessage = (e) => { if (e.data === 'focus-opener') { window.zxyReturnToCall(); bc.close(); } };
  } catch(e) {}

  miniplayerWin.document.write(`<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>ZXYsupernova · Live</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#07070d;font-family:-apple-system,sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;}#mini-header{background:rgba(13,13,20,0.95);padding:5px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}#mini-header span{color:#888;font-size:11px;font-weight:600;}.live-dot{width:7px;height:7px;border-radius:50%;background:#34c759;display:inline-block;margin-right:5px;animation:livepulse 1.2s ease infinite;}@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}#mini-grid{flex:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:4px;padding:6px;overflow:hidden;}.mini-tile{position:relative;background:#111;border-radius:8px;overflow:hidden;aspect-ratio:16/9;}.mini-tile video{width:100%;height:100%;object-fit:cover;display:block;}.mini-tile.local video{transform:scaleX(-1);}.mini-label{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);color:white;font-size:9px;padding:2px 7px;border-radius:8px;white-space:nowrap;max-width:90%;overflow:hidden;text-overflow:ellipsis;}#mini-back{background:rgba(0,122,255,0.15);color:#007aff;border:1px solid rgba(0,122,255,0.3);font-size:11px;padding:3px 10px;border-radius:8px;cursor:pointer;font-family:inherit;}#mini-back:hover{background:rgba(0,122,255,0.3);}</style>

  try{var bc=new BroadcastChannel(CHANNEL_NAME);bc.postMessage('focus-opener');bc.close();}catch(e){}
  try{if(window.opener&&!window.opener.closed)window.opener.focus();}catch(e){}
  window.close();
});
<\/script></body></html>`);
  miniplayerWin.document.close();
  setTimeout(() => syncMiniplayerStreams(), 300);
  clearInterval(miniplayerInterval);
  miniplayerInterval = setInterval(() => {
    if (!miniplayerWin || miniplayerWin.closed) { clearInterval(miniplayerInterval); miniplayerWin = null; document.getElementById('pip-badge').style.display = 'none'; return; }
    syncMiniplayerStreams();
  }, 1500);
  document.getElementById('pip-badge').style.display = 'block';

function syncMiniplayerStreams() {
  if (!miniplayerWin || miniplayerWin.closed) return;
  const grid = miniplayerWin.document.getElementById('mini-grid');
  if (!grid) return;
  const desired = {};
  if (myStream) desired['__local__'] = { stream: myStream, label: 'You', isLocal: true };
  Object.keys(peerVideoSlots).forEach(peerId => {
    const vid = document.getElementById('v-' + peerId);
    if (vid && vid.srcObject) desired[peerId] = { stream: vid.srcObject, label: peerId.substring(0,8) + '…', isLocal: false };
  });
  grid.querySelectorAll('.mini-tile').forEach(tile => { if (!desired[tile.dataset.id]) tile.remove(); });
  Object.keys(desired).forEach(id => {
    let tile = grid.querySelector(`[data-id="${id}"]`);
    if (!tile) {
      tile = miniplayerWin.document.createElement('div');
      tile.className = 'mini-tile' + (desired[id].isLocal ? ' local' : '');
      tile.dataset.id = id;
      const v = miniplayerWin.document.createElement('video');
      v.autoplay = true; v.playsInline = true;
      if (desired[id].isLocal) v.muted = true;
      const lbl = miniplayerWin.document.createElement('div');
      lbl.className = 'mini-label'; lbl.textContent = desired[id].label;
      tile.appendChild(v); tile.appendChild(lbl); grid.appendChild(tile);
    }
    const v = tile.querySelector('video');
    if (v.srcObject !== desired[id].stream) v.srcObject = desired[id].stream;
  });
}

  document.getElementById('modal-fields-wrapper').style.display = 'block';
  document.getElementById('container-friend-email').style.display = 'block';
  document.getElementById('container-your-name').style.display = 'block';
  document.getElementById('container-meeting-id').style.display = 'block';
  document.getElementById('container-share-link').style.display = 'block';
  document.getElementById('modal-friend-email').value = '';
  document.getElementById('modal-your-name').value = '';
  document.getElementById('modal-input').value = myId || 'Generating…';
  document.getElementById('modal-share-link').value = shareUrl;
  document.getElementById('modal-copy-link').style.display = 'inline-block';
  document.getElementById('modal-confirm').innerText = 'Send Invite';
  document.getElementById('custom-modal-overlay').style.display = 'flex';
}
function copyShareLink() {
  const link = document.getElementById('modal-share-link').value;
  navigator.clipboard.writeText(link).then(() => showToast('⛬ Link copied!')).catch(() => {
    document.getElementById('modal-share-link').select(); document.execCommand('copy'); showToast('⛬ Link copied!');
  });
}
function handleModalConfirm() {
  if (modalAction === 'endCall') {
    Object.values(connections).forEach(c => { try { c.close(); } catch(e){} });
    Object.values(calls).forEach(c => { try { c.close(); } catch(e){} });
    Object.keys(peerVideoSlots).forEach(id => { const s = peerVideoSlots[id]; if (s) s.remove(); delete peerVideoSlots[id]; });
    updateEmptyState();
    if (miniplayerWin && !miniplayerWin.closed) miniplayerWin.close();
    closeModal();
  } else if (modalAction === 'invite') {
    const friendEmail = document.getElementById('modal-friend-email').value.trim();
    const yourName = document.getElementById('modal-your-name').value.trim() || 'Someone';
    const shareUrl = document.getElementById('modal-share-link').value;
    if (!friendEmail) { showToast('⚠️ Enter your friend\'s email first.'); return; }
    const subject = encodeURIComponent(`${yourName} is inviting you to a video call`);
    const body = encodeURIComponent(
      `Hey! ${yourName} is inviting you to a live video call on ZXYsupernova.\n\n` +
      `👉 Click this link to auto-join instantly: ${shareUrl}\n\n` +
      `🔑 Or paste this Connection ID manually: ${myId}\n\n` +
      `No sign-up needed. Just click the link, allow camera & mic, and you're in!\n\nSee you there!`
    );
    window.open(`mailto:${friendEmail}?subject=${subject}&body=${body}`, '_blank');
    closeModal();
  }
}
function closeModal() { document.getElementById('custom-modal-overlay').style.display = 'none'; }

/* ── KEYBOARD & EVENTS ── */
document.getElementById('chat-msg').addEventListener('keypress', e => { if (e.key === 'Enter' && !e.shiftKey) sendChatMessage(); });
window.addEventListener('resize', adjustLocalBoxBoundary);
window.addEventListener('hashchange', checkHashAndMaybeJoin);
</script>
